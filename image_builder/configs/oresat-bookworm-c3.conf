## OreSat C3 board image builder config

release="12.11"
image_type="minimal-v6.1"
##
##Debootstrap: https://wiki.debian.org/Debootstrap
##
##debootstrap --arch=${deb_arch} --include=${deb_include} --exclude=${deb_exclude} \
##--components=${deb_components} --foreign ${deb_codename} /tmp/tmp.dir/ http://${deb_mirror}
##
deb_distribution="debian"
deb_codename="bookworm"
deb_arch="armhf"

##
##Auto includes tasksel package
tasksel_lang="task-english"
##
##Multiple tasks must be comma separated, do not force a desktop here yet...
tasksel_task="task-ssh-server"
##
##run [tasksel install standard]
tasksel_standard="enable"
##

# packages to install when debootstrap
deb_include="                           \
        bash-completion                 \
        btrfs-progs                     \
        build-essential                 \
        ca-certificates                 \
        can-utils                       \
        cloud-guest-utils               \
        cpufrequtils                    \
        dosfstools                      \
        dfu-util                        \
        firmware-misc-nonfree           \
        gcc                             \
        gdisk                           \
        git                             \
        gnupg                           \
        initramfs-tools                 \
        i2c-tools	                      \
        kitty-terminfo                  \
        less                            \
        libubootenv0.1                  \
        libubootenv-tool                \
        libgirepository-1.0-1           \
        libyaml-dev                     \
        linux-base                      \
        locales                         \
        lua5.4                          \
        lua-swupdate                    \
        net-tools                       \
        nginx                           \
        openssh-server                  \
        patch                           \
        picocom                         \
        pkg-config                      \
        python3                         \
        python3-all                     \
        python3-dev                     \
        python3-pip                     \
        python3-setuptools              \
        python3-wheel                   \
        rsync                           \
        ssl-cert                        \
        swupdate                        \
        swupdate-www                    \
        sudo                            \
        u-boot-tools                    \
        vim                             \
        wget                            \
        zstd                            \
"

# package to not install when debootstrap
deb_exclude="           \
        avahi-daemon    \
        ifupdown        \
        man-db          \
        manpages        \
        manpages-dev    \
"

deb_components="main contrib non-free non-free-firmware"
deb_mirror=""

# packages to install when chroot that can fail in debootstrap
deb_additional_pkgs="   \
        libpam-systemd	                \
        liblua5.4-0                     \
"

rfs_username="debian"
rfs_fullname="OreSat Developer"
rfs_password="temppwd"
rfs_hostname="oresat-bookworm-c3"
rfs_root_password="root"
rfs_default_locale="en_US.UTF-8"
rfs_etc_dogtag="OreSat C3 Board Debian Bookworm Image"
rfs_console_banner="Support: https://github.com/oresat/oresat-linux"
rfs_console_user_pass="enable"
rfs_ssh_banner="Support: https://github.com/oresat/oresat-linux"
rfs_ssh_user_pass="enable"
rfs_use_systemdnetworkd="enable"
rfs_use_systemdresolved="enable"

repo_rcnee="enable"
repo_rcnee_arch="armhf"
repo_rcnee_pkg_list="                   \
        ax5043                          \
        bb-u-boot-am335x-evm            \
        oresat-c3-watchdog              \
        stm32flash                      \
        systemd-timesyncd               \
        bbb.io-kernel-6.1-ti	\
        bbb.io-kernel-6.1-ti-am335x	\
	      bb-beagle-flasher              	\
"

include_firmware="enable"

python3_pkgs="--break-system-packages --prefer-binary oresat-c3"

chroot_COPY_SETUP_SDCARD="enable"
chroot_before_hook=""
chroot_after_hook=""
chroot_script="oresat-chroot.sh"
chroot_tarball="enable"
early_chroot_script="oresat-early-chroot.sh"
keep_ssh_keys="enable"
